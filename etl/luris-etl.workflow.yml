> 이 파일을 .github/workflows/luris-etl.yml 로 이동(웹에서 편집→파일명 변경)하면 활성화됩니다.

name: LURIS ETL

on:
  schedule:
    - cron: '0 3 15 * *'   # 매월 15일 12:00 KST
  workflow_dispatch:
    inputs:
      month:
        description: 'YYYYMM (release 모드에서 필수, auto 모드는 비워도 됨)'
        required: false
      mode:
        description: '데이터 취득 방식'
        type: choice
        options: [auto, release]
        default: auto

jobs:
  etl:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 의존성 설치
        run: pip install --quiet openpyxl psycopg2-binary requests

      - name: 데이터 취득 (auto - eum.go.kr 다운로드)
        if: ${{ github.event_name == 'schedule' || inputs.mode == 'auto' }}
        run: python etl/fetch_eum.py --out data

      - name: 데이터 취득 (release - 릴리스 자산)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'release' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          test -n "${{ inputs.month }}" || { echo 'release 모드는 month 입력 필수'; exit 1; }
          mkdir -p data
          gh release download "data-${{ inputs.month }}" --dir data
          cd data && for z in *.zip; do [ -e "$z" ] && unzip -o "$z"; done; true
          ls -la

      - name: 파일·월 확정
        id: resolve
        run: |
          LAW=$(ls data/*법령정보*.xlsx | head -1)
          ACT=$(ls data/*행위제한정보*.xlsx | head -1)
          MONTH="${{ inputs.month }}"
          if [ -z "$MONTH" ]; then
            MONTH=$(echo "$LAW" | grep -oE '20[0-9]{6}' | head -1 | cut -c1-6)
          fi
          test -n "$MONTH" || { echo '월(YYYYMM) 확정 실패 — month 입력으로 재실행'; exit 1; }
          echo "law=$LAW" >> "$GITHUB_OUTPUT"
          echo "act=$ACT" >> "$GITHUB_OUTPUT"
          echo "month=$MONTH" >> "$GITHUB_OUTPUT"
          echo "적재 대상: $LAW / $ACT / month=$MONTH"

      - name: Supabase 적재
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          test -n "$DATABASE_URL" || { echo 'Settings > Secrets and variables > Actions 에 DATABASE_URL 등록 필요'; exit 1; }
          python etl/load_luris.py --law "${{ steps.resolve.outputs.law }}" --act "${{ steps.resolve.outputs.act }}" --month "${{ steps.resolve.outputs.month }}"
