name: LURIS ETL

on:
  schedule:
    - cron: '0 3 15-18 * *'   # 매월 15~18일 12:00 KST, 성공한 날 이후는 자동 스킵
  workflow_dispatch:
    inputs:
      month:
        description: 'YYYYMM (release 모드에서 필수, auto 모드는 비워도 됨)'
        required: false
      mode:
        description: '데이터 취득 방식'
        type: choice
        options: [auto, release]
        default: auto

jobs:
  etl:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 의존성 설치
        run: pip install --quiet openpyxl psycopg2-binary requests

      - name: 적재 이력 가드 (스케줄만)
        id: guard
        if: ${{ github.event_name == 'schedule' }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python etl/check_loaded.py

      - name: 데이터 취득 (auto - eum.go.kr 다운로드)
        if: ${{ steps.guard.outputs.skip != 'true' && (github.event_name == 'schedule' || inputs.mode == 'auto') }}
        run: python etl/fetch_eum.py --out data

      - name: 데이터 취득 (release - 릴리스 자산)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'release' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          test -n "${{ inputs.month }}" || { echo 'release 모드는 month 입력 필수'; exit 1; }
          mkdir -p data
          gh release download "data-${{ inputs.month }}" --dir data
          cd data && for z in *.zip; do [ -e "$z" ] && unzip -o "$z"; done; true
          ls -la

      - name: 파일·월 확정
        id: resolve
        if: ${{ steps.guard.outputs.skip != 'true' }}
        run: |
          LAW=$(ls data/*법령정보*.xlsx | head -1)
          ACT=$(ls data/*행위제한정보*.xlsx | head -1)
          MONTH="${{ inputs.month }}"
          if [ -z "$MONTH" ]; then
            MONTH=$(ls data/*법령정보*.xlsx | grep -oE '20[0-9]{6}' | head -1 | cut -c1-6)
          fi
          test -n "$MONTH" || MONTH=$(date +%Y%m)
          echo "law=$LAW" >> "$GITHUB_OUTPUT"
          echo "act=$ACT" >> "$GITHUB_OUTPUT"
          echo "month=$MONTH" >> "$GITHUB_OUTPUT"
          echo "적재 대상: $LAW / $ACT / month=$MONTH"

      - name: Supabase 적재
        if: ${{ steps.guard.outputs.skip != 'true' }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python etl/load_luris.py --law "${{ steps.resolve.outputs.law }}" --act "${{ steps.resolve.outputs.act }}" --month "${{ steps.resolve.outputs.month }}"
